app = "hermit-dock"
primary_region = "dfw"

[build]

[env]
  PORT = "8080"
  MTLS_PORT = "8443"

# Browser / OAuth traffic — Fly terminates TLS at the edge (publicly-trusted cert).
[http_service]
  internal_port = 8080
  force_https = true
  # Gateway holds persistent Shore WebSocket tunnels — must stay up.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

# Shore mTLS — raw TCP passthrough (handlers = []) so the app terminates TLS
# itself and can request+verify the Shore client certificate. Fly does NOT
# touch TLS here; Dock presents a Hermit-CA-signed server cert on :8443.
[[services]]
  protocol = "tcp"
  internal_port = 8443

  [[services.ports]]
    port = 8443
    handlers = []

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
