<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Hermit Brand Palette — warm earth tones */
        :root {
            --bg-base: #1a1410;
            --bg-surface: #252019;
            --bg-overlay: #2e2820;
            --bg-raised: #362f26;
            --bg-input: #1a1410;
            --border: #4a3f35;
            --border-focus: #c4a66a;
            --accent: #c4a66a;
            --accent-hover: #d4b87a;
            --accent-glow: rgba(196, 166, 106, 0.2);
            --text-primary: #e8dcc8;
            --text-muted: #8b7d6b;
            --text-subtle: #a09080;
            --text-on-accent: #1a1410;
            --red: #8b3a3a;
            --red-bg: rgba(139, 58, 58, 0.15);
            --red-border: rgba(139, 58, 58, 0.4);
            --red-text: #c06060;
            --teal: #4a6670;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle warm ambient glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 30% 40%, rgba(196, 166, 106, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(74, 102, 112, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(196, 166, 106, 0.02) 0%, transparent 40%);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem 2rem;
            box-shadow:
                0 4px 32px rgba(0, 0, 0, 0.4),
                0 1px 4px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(196, 166, 106, 0.04);
            animation: cardSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hermit Dock Logo */
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 1rem;
            animation: logoFloat 6s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(0.85) sepia(0.2);
        }

        .brand-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .brand-sub {
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem 1.5rem;
            margin-top: 0.5rem;
            background: var(--accent);
            color: var(--text-on-accent);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.02em;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Error message */
        .error-msg {
            display: none;
            padding: 0.6rem 0.8rem;
            margin-bottom: 1rem;
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            border-radius: 8px;
            color: var(--red-text);
            font-size: 0.85rem;
            text-align: center;
            animation: errorShake 0.4s ease-in-out;
        }

        .error-msg.visible {
            display: block;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Tab switcher */
        .tab-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: color 0.2s, border-color 0.2s;
            margin-bottom: -1px;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* OAuth button */
        .oauth-btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            margin-top: 0.5rem;
            background: var(--bg-overlay);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .oauth-btn:hover {
            border-color: var(--accent);
            background: var(--bg-raised);
        }

        .oauth-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1rem 0;
            color: var(--text-muted);
            font-size: 0.72rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .oauth-divider::before,
        .oauth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Success message */
        .success-msg {
            display: none;
            padding: 0.6rem 0.8rem;
            margin-bottom: 1rem;
            background: rgba(90, 122, 90, 0.15);
            border: 1px solid rgba(90, 122, 90, 0.4);
            border-radius: 8px;
            color: #7aaa7a;
            font-size: 0.85rem;
            text-align: center;
        }

        .success-msg.visible { display: block; }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .login-footer .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 0.4rem;
            vertical-align: middle;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }
            .login-card {
                padding: 2rem 1.5rem 1.5rem;
                border-radius: 12px;
            }
            .brand-title {
                font-size: 1.5rem;
            }
            .logo {
                width: 60px;
                height: 60px;
            }
        }

        /* Loading state for button */
        .submit-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-on-accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: inline-block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrap">
                <div class="logo">
                    <img src="/static/dock-logo.png" alt="Hermit Dock">
                </div>
                <div class="brand-title">Hermit</div>
                <div class="brand-sub">Secure Gateway</div>
            </div>

            <!-- Tab bar -->
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('login', this)">Sign In</button>
                <button class="tab-btn" onclick="switchTab('register', this)">Register</button>
            </div>

            <!-- ── Sign In tab ── -->
            <div id="tab-login" class="tab-panel active">
                <!-- GitHub OAuth -->
                <a href="/auth/github" class="oauth-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    Sign in with GitHub
                </a>

                <div class="oauth-divider">or</div>

                <div id="login-error" class="error-msg">Invalid credentials</div>

                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-input" type="text" id="username" name="username"
                               placeholder="Enter username" autocomplete="username" autofocus required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-input" type="password" id="password" name="password"
                               placeholder="Enter password" autocomplete="current-password" required>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Sign In</span>
                        <span class="spinner"></span>
                    </button>
                </form>
            </div>

            <!-- ── Register tab ── -->
            <div id="tab-register" class="tab-panel">
                <div id="register-error" class="error-msg">Registration failed</div>
                <div id="register-success" class="success-msg">Account created — signing you in…</div>

                <form id="registerForm" onsubmit="return handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label" for="reg-username">Username</label>
                        <input class="form-input" type="text" id="reg-username" name="username"
                               placeholder="Choose a username" autocomplete="username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="reg-email">Email <span style="opacity:0.5">(optional)</span></label>
                        <input class="form-input" type="email" id="reg-email" name="email"
                               placeholder="you@example.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="reg-password">Password</label>
                        <input class="form-input" type="password" id="reg-password" name="password"
                               placeholder="Choose a strong password" autocomplete="new-password" required>
                    </div>

                    <button type="submit" class="submit-btn" id="registerBtn">
                        <span class="btn-text">Create Account</span>
                        <span class="spinner"></span>
                    </button>
                </form>

                <div class="oauth-divider" style="margin-top:1rem">or sign up with</div>
                <a href="/auth/github" class="oauth-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    GitHub
                </a>
            </div>

            <div class="login-footer">
                <span class="dot"></span> hermit-dock <span class="dot"></span>
            </div>
        </div>
    </div>

    <script>
        function switchTab(name, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn  = document.getElementById('submitBtn');
            const err  = document.getElementById('login-error');

            err.classList.remove('visible');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const body = new URLSearchParams({ username: user, password: pass });
                const resp = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });

                if (resp.ok) {
                    window.location.reload();
                } else {
                    const text = (await resp.text()).trim();
                    err.textContent = text === 'use_oauth'
                        ? 'This account uses OAuth — click "Sign in with GitHub" above'
                        : 'Invalid credentials';
                    err.classList.add('visible');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    document.getElementById('password').focus();
                    document.getElementById('password').select();
                }
            } catch (error) {
                err.textContent = 'Connection error — try again';
                err.classList.add('visible');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const email    = document.getElementById('reg-email').value;
            const pass     = document.getElementById('reg-password').value;
            const btn      = document.getElementById('registerBtn');
            const err      = document.getElementById('register-error');
            const success  = document.getElementById('register-success');

            err.classList.remove('visible');
            success.classList.remove('visible');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const body = new URLSearchParams({ username, email, password: pass });
                const resp = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });

                if (resp.ok) {
                    success.classList.add('visible');
                    setTimeout(() => window.location.reload(), 800);
                } else {
                    const text = (await resp.text()).trim();
                    err.textContent = text === 'username_taken'
                        ? 'Username already taken — choose another'
                        : 'Registration failed — try again';
                    err.classList.add('visible');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            } catch (error) {
                err.textContent = 'Connection error — try again';
                err.classList.add('visible');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        window.addEventListener('load', () => {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
