<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Hermit Brand Palette — warm earth tones */
        :root {
            --bg-base: #1a1410;
            --bg-surface: #252019;
            --bg-overlay: #2e2820;
            --bg-raised: #362f26;
            --bg-input: #1a1410;
            --border: #4a3f35;
            --border-focus: #c4a66a;
            --accent: #c4a66a;
            --accent-hover: #d4b87a;
            --accent-glow: rgba(196, 166, 106, 0.2);
            --text-primary: #e8dcc8;
            --text-muted: #8b7d6b;
            --text-subtle: #a09080;
            --text-on-accent: #1a1410;
            --red: #8b3a3a;
            --red-bg: rgba(139, 58, 58, 0.15);
            --red-border: rgba(139, 58, 58, 0.4);
            --red-text: #c06060;
            --teal: #4a6670;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle warm ambient glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 30% 40%, rgba(196, 166, 106, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(74, 102, 112, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(196, 166, 106, 0.02) 0%, transparent 40%);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem 2rem;
            box-shadow:
                0 4px 32px rgba(0, 0, 0, 0.4),
                0 1px 4px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(196, 166, 106, 0.04);
            animation: cardSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hermit Crab Logo */
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 72px;
            height: 72px;
            margin-bottom: 1rem;
            animation: logoFloat 6s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .brand-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .brand-sub {
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem 1.5rem;
            margin-top: 0.5rem;
            background: var(--accent);
            color: var(--text-on-accent);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.02em;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Error message */
        .error-msg {
            display: none;
            padding: 0.6rem 0.8rem;
            margin-bottom: 1rem;
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            border-radius: 8px;
            color: var(--red-text);
            font-size: 0.85rem;
            text-align: center;
            animation: errorShake 0.4s ease-in-out;
        }

        .error-msg.visible {
            display: block;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .login-footer .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 0.4rem;
            vertical-align: middle;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }
            .login-card {
                padding: 2rem 1.5rem 1.5rem;
                border-radius: 12px;
            }
            .brand-title {
                font-size: 1.5rem;
            }
            .logo {
                width: 60px;
                height: 60px;
            }
        }

        /* Loading state for button */
        .submit-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-on-accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: inline-block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrap">
                <div class="logo">
                    <!-- Hermit Crab Shell SVG — gold and warm brown -->
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <!-- Shell spiral -->
                        <path d="M50 20 C70 20, 82 35, 82 50 C82 68, 68 82, 50 82 C35 82, 22 72, 22 58 C22 46, 32 36, 42 36 C52 36, 60 44, 60 52 C60 60, 54 66, 48 66 C42 66, 38 62, 38 56 C38 52, 41 48, 46 48"
                              fill="none" stroke="#c4a66a" stroke-width="3" stroke-linecap="round"
                              opacity="0.9">
                            <animate attributeName="stroke-dasharray" from="0 300" to="300 0" dur="1.5s" fill="freeze" />
                        </path>
                        <!-- Shell inner highlight -->
                        <path d="M46 48 C43 48, 40 52, 42 55"
                              fill="none" stroke="#d4b87a" stroke-width="2" stroke-linecap="round" opacity="0.5">
                            <animate attributeName="stroke-dasharray" from="0 50" to="50 0" dur="1.5s" begin="0.8s" fill="freeze" />
                        </path>
                        <!-- Crab legs — left -->
                        <line x1="30" y1="70" x2="15" y2="80" stroke="#8b7d6b" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
                            <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.4s" begin="1.2s" fill="freeze" />
                        </line>
                        <line x1="26" y1="74" x2="12" y2="72" stroke="#8b7d6b" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
                            <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.4s" begin="1.3s" fill="freeze" />
                        </line>
                        <line x1="24" y1="66" x2="10" y2="62" stroke="#8b7d6b" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
                            <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.4s" begin="1.4s" fill="freeze" />
                        </line>
                        <!-- Crab legs — right -->
                        <line x1="68" y1="72" x2="83" y2="82" stroke="#8b7d6b" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
                            <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.4s" begin="1.2s" fill="freeze" />
                        </line>
                        <line x1="72" y1="76" x2="88" y2="74" stroke="#8b7d6b" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
                            <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.4s" begin="1.3s" fill="freeze" />
                        </line>
                        <line x1="74" y1="68" x2="90" y2="64" stroke="#8b7d6b" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
                            <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.4s" begin="1.4s" fill="freeze" />
                        </line>
                        <!-- Crab claws -->
                        <path d="M18 80 C14 84, 10 82, 12 78" fill="none" stroke="#a09080" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
                            <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.3s" begin="1.5s" fill="freeze" />
                        </path>
                        <path d="M86 82 C90 86, 94 84, 92 80" fill="none" stroke="#a09080" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
                            <animate attributeName="stroke-dasharray" from="0 30" to="30 0" dur="0.3s" begin="1.5s" fill="freeze" />
                        </path>
                        <!-- Eyes -->
                        <circle cx="36" cy="30" r="3" fill="#c4a66a" opacity="0.8">
                            <animate attributeName="opacity" from="0" to="0.8" dur="0.3s" begin="1.6s" fill="freeze" />
                        </circle>
                        <circle cx="56" cy="26" r="3" fill="#c4a66a" opacity="0.8">
                            <animate attributeName="opacity" from="0" to="0.8" dur="0.3s" begin="1.6s" fill="freeze" />
                        </circle>
                        <!-- Eye stalks -->
                        <line x1="36" y1="36" x2="36" y2="32" stroke="#a09080" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
                            <animate attributeName="stroke-dasharray" from="0 10" to="10 0" dur="0.2s" begin="1.5s" fill="freeze" />
                        </line>
                        <line x1="54" y1="34" x2="56" y2="28" stroke="#a09080" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
                            <animate attributeName="stroke-dasharray" from="0 10" to="10 0" dur="0.2s" begin="1.5s" fill="freeze" />
                        </line>
                    </svg>
                </div>
                <div class="brand-title">Hermit</div>
                <div class="brand-sub">Secure Gateway</div>
            </div>

            <div id="error" class="error-msg">Invalid credentials</div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username"
                           placeholder="Enter username" autocomplete="username" autofocus required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="Enter password" autocomplete="current-password" required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="login-footer">
                <span class="dot"></span> hermit-dock <span class="dot"></span>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('error');

            // Hide previous error
            err.classList.remove('visible');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // Test credentials with a HEAD request
                const creds = btoa(user + ':' + pass);
                const resp = await fetch('/', {
                    method: 'HEAD',
                    headers: {
                        'Authorization': 'Basic ' + creds,
                        'X-Login-Check': '1'
                    }
                });

                if (resp.ok || resp.status === 302 || resp.status === 304) {
                    // Credentials valid — set in URL for browser session persistence
                    const loc = window.location;
                    const authUrl = loc.protocol + '//' +
                                    encodeURIComponent(user) + ':' +
                                    encodeURIComponent(pass) + '@' +
                                    loc.host + '/';
                    window.location.href = authUrl;
                } else {
                    // Invalid credentials
                    err.classList.add('visible');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    document.getElementById('password').focus();
                    document.getElementById('password').select();
                }
            } catch (error) {
                err.textContent = 'Connection error — try again';
                err.classList.add('visible');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Focus username on load
        window.addEventListener('load', () => {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
