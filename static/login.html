<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Hermit Brand Palette — warm earth tones */
        :root {
            --bg-base: #1a1410;
            --bg-surface: #252019;
            --bg-overlay: #2e2820;
            --bg-raised: #362f26;
            --bg-input: #1a1410;
            --border: #4a3f35;
            --border-focus: #c4a66a;
            --accent: #c4a66a;
            --accent-hover: #d4b87a;
            --accent-glow: rgba(196, 166, 106, 0.2);
            --text-primary: #e8dcc8;
            --text-muted: #8b7d6b;
            --text-subtle: #a09080;
            --text-on-accent: #1a1410;
            --red: #8b3a3a;
            --red-bg: rgba(139, 58, 58, 0.15);
            --red-border: rgba(139, 58, 58, 0.4);
            --red-text: #c06060;
            --teal: #4a6670;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle warm ambient glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 30% 40%, rgba(196, 166, 106, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(74, 102, 112, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(196, 166, 106, 0.02) 0%, transparent 40%);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem 2rem;
            box-shadow:
                0 4px 32px rgba(0, 0, 0, 0.4),
                0 1px 4px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(196, 166, 106, 0.04);
            animation: cardSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hermit Dock Logo */
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 1rem;
            animation: logoFloat 6s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(0.85) sepia(0.2);
        }

        .brand-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .brand-sub {
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .submit-btn {
            width: 100%;
            padding: 0.8rem 1.5rem;
            margin-top: 0.5rem;
            background: var(--accent);
            color: var(--text-on-accent);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.02em;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Error message */
        .error-msg {
            display: none;
            padding: 0.6rem 0.8rem;
            margin-bottom: 1rem;
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            border-radius: 8px;
            color: var(--red-text);
            font-size: 0.85rem;
            text-align: center;
            animation: errorShake 0.4s ease-in-out;
        }

        .error-msg.visible {
            display: block;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .login-footer .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 0.4rem;
            vertical-align: middle;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 1rem;
            }
            .login-card {
                padding: 2rem 1.5rem 1.5rem;
                border-radius: 12px;
            }
            .brand-title {
                font-size: 1.5rem;
            }
            .logo {
                width: 60px;
                height: 60px;
            }
        }

        /* Loading state for button */
        .submit-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-on-accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .spinner { display: inline-block; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrap">
                <div class="logo">
                    <img src="/static/dock-logo.png" alt="Hermit Dock">
                </div>
                <div class="brand-title">Hermit</div>
                <div class="brand-sub">Secure Gateway</div>
            </div>

            <div id="error" class="error-msg">Invalid credentials</div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-input" type="text" id="username" name="username"
                           placeholder="Enter username" autocomplete="username" autofocus required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password"
                           placeholder="Enter password" autocomplete="current-password" required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="login-footer">
                <span class="dot"></span> hermit-dock <span class="dot"></span>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('error');

            // Hide previous error
            err.classList.remove('visible');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // POST credentials to /login — server sets a session cookie
                const body = new URLSearchParams({ username: user, password: pass });
                const resp = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });

                if (resp.ok) {
                    // Cookie is set — reload to enter authenticated session
                    window.location.reload();
                } else {
                    // Invalid credentials
                    err.classList.add('visible');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    document.getElementById('password').focus();
                    document.getElementById('password').select();
                }
            } catch (error) {
                err.textContent = 'Connection error — try again';
                err.classList.add('visible');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // Focus username on load
        window.addEventListener('load', () => {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
